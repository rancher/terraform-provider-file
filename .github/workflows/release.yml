name: Release

on:
  push:
    branches:
    - main
  workflow_dispatch:

permissions: {}

jobs:
  release-please-release:
    name: 'Release Please (Release Only)'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.release-please-release.outputs.version }}
      release_created: ${{ steps.release-please-release.outputs.release_created }}
    steps:
      - name: Release Please (Release Only)
        id: release-please-release
        # https://github.com/googleapis/release-please-action/releases
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
          skip-github-pull-request: true

  release-please-pr:
    needs:
      - release-please-release
      - release
    if: |
      !cancelled() &&
      needs.release-please-release.result == 'success' &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    name: 'Release Please (PR Only)'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    outputs:
      prs_created: ${{ steps.release-please-pr.outputs.prs_created }}
      pr: ${{ steps.release-please-pr.outputs.pr }}
      version: ${{ steps.release-please-pr.outputs.version || steps.release-please-pr.outputs['.--version'] }}
    steps:
      - name: Release Please (PR Only)
        id: release-please-pr
        # https://github.com/googleapis/release-please-action/releases
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  # Release tests only run if release-please created or updated a PR
  release-test:
    needs: release-please-pr
    if: needs.release-please-pr.outputs.prs_created == 'true'
    name: 'Release Tests'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    outputs:
      outcome: ${{ steps.run-unit-tests.conclusion == 'success' && steps.run-acc-tests.conclusion == 'success' }}
    steps:
      - name: Checkout Repository
        id: checkout-repository
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Wait for E2E
        id: wait-for-e2e
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ fromJson(needs.release-please-pr.outputs.pr).number }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const scriptPath = `.github/workflows/scripts/wait-for-e2e.js`;
            const { default: script } = await import(scriptPath);
            await script({github, context, core, process});
      - name: Checkout Repository Again
        id: checkout-repository-again
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        id: setup-go
        # https://github.com/actions/setup-go/releases
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Run Unit Tests
        id: run-unit-tests
        run: .github/workflows/scripts/nix-run.sh bash .github/workflows/scripts/run-unit-tests.sh
      - name: Run Acceptance Tests
        id: run-acc-tests
        run: .github/workflows/scripts/nix-run.sh bash .github/workflows/scripts/run-acc-tests.sh
      - name: Report Tests Passed
        id: report-tests-passed
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: always() && (steps.run-unit-tests.conclusion == 'success') && (steps.run-acc-tests.conclusion == 'success')
        env:
          PR_NUMBER: ${{ fromJson(needs.release-please-pr.outputs.pr).number }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          TEST_STATUS: passed
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const scriptPath = `.github/workflows/scripts/report-tests.js`;
            const { default: script } = await import(scriptPath);
            await script({github, context, core, process});
      - name: Report Tests Failed
        id: report-tests-failed
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: always() && ((steps.run-unit-tests.conclusion == 'failure') || (steps.run-acc-tests.conclusion == 'failure'))
        env:
          PR_NUMBER: ${{ fromJson(needs.release-please-pr.outputs.pr).number }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          TEST_STATUS: failed
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const scriptPath = `.github/workflows/scripts/report-tests.js`;
            const { default: script } = await import(scriptPath);
            await script({github, context, core, process});

  # This runs if release-please created or updated a PR, tests run and pass
  rc-release:
    needs:
      - release-please-pr
      - release-test
    if: needs.release-please-pr.outputs.prs_created == 'true' && needs.release-test.outputs.outcome == 'true'
    name: 'RC Release'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repository
        id: checkout-repository
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # If the e2e tests pass we automatically generate an RC release
      #   this shouldn't happen when the release PR is merged, only when it's opened or updated
      - name: Create and Push RC Tag via API
        id: create-push-rc-tag
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TARGET_VERSION: ${{ needs.release-please-pr.outputs.version }}
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const scriptPath = `.github/workflows/scripts/create-push-rc-tag.js`;
            const { default: script } = await import(scriptPath);
            await script({github, context, core, process});
      - name: Retrieve GPG Credentials
        id: retrieve-gpg-credentials
        # https://github.com/rancher-eio/read-vault-secrets/commits
        uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # main
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/signing/gpg passphrase | GPG_PASSPHRASE ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKeyId | GPG_KEY_ID ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKey | GPG_KEY
      - name: Import GPG Key
        id: import-gpg-key
        env:
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_KEY: ${{ env.GPG_KEY }}
        run: .github/workflows/scripts/nix-run.sh bash .github/workflows/scripts/import-gpg-key.sh
      - name: Run GoReleaser
        id: run-goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
          GORELEASER_CONFIG: .goreleaser_rc.yml
        run: .github/workflows/scripts/nix-run.sh bash .github/workflows/scripts/run-goreleaser.sh
        # GoReleaser will automatically set RC releases to prerelease instead of draft (no need to publish)

  # These run after release-please generates a release
  release:
    needs:
      - release-please-release
    if: needs.release-please-release.outputs.release_created == 'true'
    name: 'Full Release'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repository
        id: checkout-repository
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Create and Push Tag
        id: create-push-tag
        env:
          VERSION: ${{ needs.release-please-release.outputs.version }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: .github/workflows/scripts/nix-run.sh bash .github/workflows/scripts/create-push-tag.sh
      - name: Setup Go
        id: setup-go
        # https://github.com/actions/setup-go/releases
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Retrieve GPG Credentials
        id: retrieve-gpg-credentials
        # https://github.com/rancher-eio/read-vault-secrets/commits
        uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # @main
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/signing/gpg passphrase | GPG_PASSPHRASE ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKeyId | GPG_KEY_ID ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKey | GPG_KEY
      - name: Import GPG Key
        id: import-gpg-key
        env:
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_KEY: ${{ env.GPG_KEY }}
        run: .github/workflows/scripts/nix-run.sh bash .github/workflows/scripts/import-gpg-key.sh
      - name: Run GoReleaser
        id: run-goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
        run: .github/workflows/scripts/nix-run.sh bash .github/workflows/scripts/run-goreleaser.sh
      - name: Publish Release
        id: publish-release
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VERSION: ${{ needs.release-please-release.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const scriptPath = `.github/workflows/scripts/publish-release.js`;
            const { default: script } = await import(scriptPath);
            await script({github, context, core, process});
